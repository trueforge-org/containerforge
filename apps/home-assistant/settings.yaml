# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/home-assistant/core"
ports:
  - port: 8123
    protocol: tcp
    required: false
env:
  - name: HOME
    default: "/config"
    required: false
  - name: PYTHONUSERBASE
    default: "/usr/local"
    required: false
volumes:
  - path: /config
    required: true
