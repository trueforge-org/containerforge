# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://freshrss.org/"
ports:
  - port: 80
    protocol: tcp
    required: false
  - port: 443
    protocol: tcp
    required: false
env:
  - name: ADMIN_API_PASSWORD
    default: "MYADMINAPIPASSWORD"
    required: false
  - name: ADMIN_EMAIL
    default: ""
    required: false
  - name: ADMIN_PASSWORD
    default: "MYADMINPASSWORD"
    required: false
  - name: TZ
    default: "Etc/UTC"
    required: false
volumes:
  - path: /config
    required: true
opt_dependencies:
  - name: postgresql
