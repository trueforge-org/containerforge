# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/schlagmichdoch/PairDrop"
ports:
  - port: 3000
    protocol: tcp
    required: false
env:
  - name: NODE_ENV
    default: "production"
    required: false
volumes:
  - path: /config
    required: true
