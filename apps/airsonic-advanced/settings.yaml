# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/kagemomiji/airsonic-advanced"
ports:
  - port: 4040
    protocol: tcp
    required: false
env:
  - name: AIRSONIC_ADVANCED_HOME
    default: "/app"
    required: false
  - name: AIRSONIC_ADVANCED_SETTINGS
    default: "/config"
    required: false
  - name: LANG
    default: "C.UTF-8"
    required: false
volumes:
  - path: /config
    required: true
opt_dependencies:
  - image: postgresql
  - image: mariadb
