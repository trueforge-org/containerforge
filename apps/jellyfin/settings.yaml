# yaml-language-server: $schema=../../settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/jellyfin/jellyfin"
ports:
  - port: 8096
    protocol: tcp
    required: false
  - port: 8920
    protocol: tcp
    required: false
env:
  - name: MALLOC_TRIM_THRESHOLD_
    default: "131072"
    required: false
  - name: NVIDIA_DRIVER_CAPABILITIES
    default: "compute,video,utility"
    required: false
volumes:
  - path: /config
    required: true
