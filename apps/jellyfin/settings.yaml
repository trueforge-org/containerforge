# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/jellyfin/jellyfin"
ports:
  - port: 1900
    protocol: udp
    required: false
  - port: 7359
    protocol: udp
    required: false
  - port: 8096
    protocol: tcp
    required: false
  - port: 8920
    protocol: tcp
    required: false
env:
  - name: JELLYFIN_PublishedServerUrl
    default: ""
    required: false
  - name: NVIDIA_DRIVER_CAPABILITIES
    default: "compute,video,utility"
    required: false
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: UMASK
    default: "002"
    required: false
volumes:
  - path: /config
    required: true
