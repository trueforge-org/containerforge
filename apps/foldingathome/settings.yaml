# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://foldingathome.org/"
ports:
  - port: 7396
    protocol: tcp
    required: false
  - port: 36330
    protocol: tcp
    required: false
env:
  - name: NVIDIA_DRIVER_CAPABILITIES
    default: "compute,video,utility"
    required: false
  - name: PASSKEY
    default: ""
    required: false
  - name: TEAM
    default: "0"
    required: false
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: USER
    default: "Anonymous"
    required: false
volumes:
  - path: /config
    required: true
