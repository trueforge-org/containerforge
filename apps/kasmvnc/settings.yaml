# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/kasmtech/KasmVNC"
ports:
  - port: 3000
    protocol: tcp
    required: false
  - port: 3001
    protocol: tcp
    required: false
env:
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: CUSTOM_PORT
    default: "3000"
    required: false
  - name: CUSTOM_HTTPS_PORT
    default: "3001"
    required: false
  - name: CUSTOM_USER
    default: "apps"
    required: false
  - name: PASSWORD
    default: ""
    required: false
  - name: SUBFOLDER
    default: "/"
    required: false
volumes:
  - path: /config
    required: true
