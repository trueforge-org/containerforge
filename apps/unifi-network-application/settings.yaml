# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://ui.com/"
ports:
  - port: 8080
    protocol: tcp
    required: false
  - port: 8443
    protocol: tcp
    required: false
  - port: 8843
    protocol: tcp
    required: false
  - port: 8880
    protocol: tcp
    required: false
env:
  - name: TZ
    default: "Etc/UTC"
    required: false
volumes:
  - path: /config
    required: true
