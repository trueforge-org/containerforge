# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/Readarr/Readarr"
ports:
  - port: 8787
    protocol: tcp
    required: false
env:
  - name: COMPlus_EnableDiagnostics
    default: "0"
    required: false
  - name: READARR__SERVER__PORT
    default: "8787"
    required: false
  - name: READARR__UPDATE__BRANCH
    default: "develop"
    required: false
volumes:
  - path: /config
    required: true
opt_dependencies:
  - name: postgresql
