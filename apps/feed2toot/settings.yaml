# yaml-language-server: $schema=../../settings.schema.json
schema_version: 1
upstream_env_url: "https://gitlab.com/chaica/feed2toot"
ports:
  []
env:
  - name: PYTHONIOENCODING
    default: "utf-8"
    required: false
  - name: PYTHONUNBUFFERED
    default: "1"
    required: false
volumes:
  - path: /config
    required: true
