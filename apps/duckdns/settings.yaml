# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://duckdns.org/"
ports:
  []
env:
  - name: SUBDOMAINS
    default: ""
    required: true
  - name: TOKEN
    default: ""
    required: true
  - name: TZ
    default: "Etc/UTC"
    required: false
volumes:
  - path: /config
    required: true
