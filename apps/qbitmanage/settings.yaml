# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/StuffAnThings/qbit_manage"
ports:
  []
env:
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: UMASK
    default: "002"
    required: false
  - name: QBT_CONFIG
    default: ""
    required: false
  - name: QBT_CONFIG_DIR
    default: ""
    required: false
  - name: ARGS
    default: ""
    required: false
volumes:
  - path: /config
    required: true
