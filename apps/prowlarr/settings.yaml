# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/Prowlarr/Prowlarr"
ports:
  - port: 9696
    protocol: tcp
    required: false
env:
  - name: DOTNET_EnableDiagnostics
    default: "0"
    required: false
  - name: PROWLARR__SERVER__PORT
    default: "9696"
    required: false
  - name: PROWLARR__UPDATE__BRANCH
    default: "develop"
    required: false
volumes:
  - path: /config
    required: true
opt_dependencies:
  - name: postgresql
