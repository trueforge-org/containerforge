# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/Requarks/wiki"
ports:
  - port: 3000
    protocol: tcp
    required: false
env:
  - name: DB_HOST
    default: "postgresql"
    required: true
  - name: DB_NAME
    default: "MYPOSTGRESDB"
    required: true
  - name: DB_PASS
    default: "MYPOSTGRESPASSWORD"
    required: true
  - name: DB_PORT
    default: "5432"
    required: true
  - name: DB_TYPE
    default: "postgres"
    required: true
  - name: DB_USER
    default: "MYPOSTGRESUSER"
    required: true
  - name: TZ
    default: "Etc/UTC"
    required: false
volumes:
  - path: /config
    required: true
dependencies:
  - name: postgresql
