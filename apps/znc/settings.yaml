# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "http://wiki.znc.in/ZNC"
ports:
  - port: 6501
    protocol: tcp
    required: false
env:
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: ZNC_PASS
    default: ""
    required: false
  - name: ZNC_USER
    default: "admin"
    required: false
volumes:
  - path: /config
    required: true
