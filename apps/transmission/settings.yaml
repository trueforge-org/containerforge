# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/transmission/transmission"
ports:
  - port: 9091
    protocol: tcp
    required: false
  - port: 51413
    protocol: tcp
    required: false
  - port: 51413
    protocol: udp
    required: false
env:
  - name: TRANSMISSION_PEER_PORT
    default: "51413"
    required: false
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: UMASK
    default: "002"
    required: false
volumes:
  - path: /config
    required: true
