# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/pyload/pyload"
ports:
  - port: 8000
    protocol: tcp
    required: false
env:
  - name: PYLOAD_PASSWORD
    default: "pyload"
    required: false
  - name: PYLOAD_USERNAME
    default: "pyload"
    required: false
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: UMASK
    default: "002"
    required: false
volumes:
  - path: /config
    required: true
