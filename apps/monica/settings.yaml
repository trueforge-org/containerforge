# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/monicahq/monica"
ports:
  - port: 80
    protocol: tcp
    required: false
  - port: 443
    protocol: tcp
    required: false
env:
  - name: MEMORY_LIMIT
    default: "512M"
    required: false
volumes:
  - path: /config
    required: true
dependencies:
  - image: mariadb
