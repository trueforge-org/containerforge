# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/netbox-community/netbox"
ports:
  - port: 8000
    protocol: tcp
    required: false
env:
  - name: ALLOWED_HOSTS
    default: "*"
    required: false
  - name: SECRET_KEY
    default: ""
    required: true
  - name: SUPERUSER_EMAIL
    default: ""
    required: false
  - name: SUPERUSER_NAME
    default: "admin"
    required: false
  - name: SUPERUSER_PASSWORD
    default: ""
    required: false
  - name: TZ
    default: "Etc/UTC"
    required: false
volumes:
  - path: /config
    required: true
dependencies:
  - name: postgresql
  - name: valkey
