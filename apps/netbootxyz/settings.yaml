# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://netboot.xyz"
ports:
  - port: 69
    protocol: udp
    required: false
  - port: 3000
    protocol: tcp
    required: false
  - port: 8080
    protocol: tcp
    required: false
env:
  - name: MENU_VERSION
    default: ""
    required: false
  - name: PORT_RANGE
    default: ""
    required: false
  - name: SUBFOLDER
    default: "/"
    required: false
  - name: TZ
    default: "Etc/UTC"
    required: false
volumes:
  - path: /config
    required: true
