# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/autobrr/qui"
ports:
  - port: 7476
    protocol: tcp
    required: false
  - port: 7476
    protocol: udp
    required: false
env:
  - name: WEBUI_PORTS
    default: "7476/tcp,7476/udp"
    required: false
volumes:
  - path: /config
    required: true
