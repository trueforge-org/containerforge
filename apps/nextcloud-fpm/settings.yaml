# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://nextcloud.com"
ports:
  []
env:
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: NX_POSTGRES_HOST
    default: "postgresql"
    required: true
  - name: NX_POSTGRES_PORT
    default: "5432"
    required: true
  - name: NX_POSTGRES_NAME
    default: "MYPOSTGRESDB"
    required: true
  - name: NX_POSTGRES_USER
    default: "MYPOSTGRESUSER"
    required: true
  - name: NX_POSTGRES_PASSWORD
    default: "MYPOSTGRESPASSWORD"
    required: true
  - name: NX_REDIS_HOST
    default: "valkey"
    required: true
  - name: NX_REDIS_PORT
    default: "6379"
    required: true
  - name: NX_REDIS_PASS
    default: "MYVALKEYPASSWORD"
    required: true
volumes:
  - path: /config
    required: true
dependencies:
  - name: postgresql
  - name: valkey
opt_dependencies:
  - name: memcache
