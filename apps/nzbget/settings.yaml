# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/nzbgetcom/nzbget"
ports:
  - port: 6789
    protocol: tcp
    required: false
env:
  - name: NZBGET__PORT
    default: "6789"
    required: false
volumes:
  - path: /config
    required: true
