# yaml-language-server: $schema=../../settings.schema.json
schema_version: 1
upstream_env_url: ""
ports:
  []
env:
  - name: DELUGE_BIN
    default: "deluged"
    required: false
  - name: PYTHON_EGG_CACHE
    default: "/config/plugins/.python-eggs"
    required: false
  - name: XDG_CONFIG_HOME
    default: "/config"
    required: false
volumes:
  - path: /config
    required: true
