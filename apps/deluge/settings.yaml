# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/deluge-torrent/deluge"
ports:
  - port: 58846
    protocol: tcp
    required: false
env:
  - name: DELUGE_BIN
    default: "deluged"
    required: false
  - name: PYTHON_EGG_CACHE
    default: "/config/plugins/.python-eggs"
    required: false
  - name: XDG_CONFIG_HOME
    default: "/config"
    required: false
volumes:
  - path: /config
    required: true
