# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/deluge-torrent/deluge"
ports:
  - port: 8112
    protocol: tcp
    required: false
  - port: 58846
    protocol: tcp
    required: false
env:
  - name: DELUGE_LOGLEVEL
    default: "info"
    required: false
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: UMASK
    default: "002"
    required: false
volumes:
  - path: /config
    required: true
