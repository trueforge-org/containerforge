# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/SickChill/SickChill"
ports:
  - port: 8081
    protocol: tcp
    required: false
env:
  - name: HOME
    default: "/config"
    required: false
  - name: PYTHONIOENCODING
    default: "UTF-8"
    required: false
volumes:
  - path: /config
    required: true
