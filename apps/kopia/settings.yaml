# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/kopia/kopia"
ports:
  []
env:
  - name: KOPIA_CHECK_FOR_UPDATES
    default: "false"
    required: false
  - name: KOPIA_PERSIST_CREDENTIALS_ON_CONNECT
    default: "false"
    required: false
  - name: KOPIA_WEB_ENABLED
    default: "true"
    required: false
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: UMASK
    default: "002"
    required: false
volumes:
  - path: /config
    required: true
