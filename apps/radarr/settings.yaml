# yaml-language-server: $schema=../../settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/Radarr/Radarr"
ports:
  - port: 7878
    protocol: tcp
    required: false
env:
  - name: DOTNET_EnableDiagnostics
    default: "0"
    required: false
  - name: RADARR__SERVER__PORT
    default: "7878"
    required: false
  - name: RADARR__UPDATE__BRANCH
    default: "develop"
    required: false
volumes:
  - path: /config
    required: true
opt_dependencies:
  - image: postgresql
