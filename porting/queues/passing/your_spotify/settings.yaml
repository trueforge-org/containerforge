# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/Yooooomi/your_spotify"
ports:
  - port: 80
    protocol: tcp
    required: false
  - port: 443
    protocol: tcp
    required: false
env:
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: APP_URL
    default: ""
    required: true
  - name: SPOTIFY_PUBLIC
    default: ""
    required: true
  - name: SPOTIFY_SECRET
    default: ""
    required: true
volumes:
  - path: /config
    required: true
opt_dependencies:
  - name: mongodb
