# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://www.luanti.org/"
ports:
  - port: 30000
    protocol: udp
    required: false
env:
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: CLI_ARGS
    default: ""
    required: false
  - name: DATA_DIR
    default: "/config/.minetest"
    required: false
volumes:
  - path: /config
    required: true
