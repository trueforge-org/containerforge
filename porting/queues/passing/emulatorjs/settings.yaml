# yaml-language-server: $schema=https://raw.githubusercontent.com/trueforge-org/forgetool/refs/heads/main/schemas/container-settings.schema.json
schema_version: 1
upstream_env_url: "https://github.com/linuxserver/emulatorjs"
ports:
  - port: 80
    protocol: tcp
    required: false
  - port: 3000
    protocol: tcp
    required: false
env:
  - name: TZ
    default: "Etc/UTC"
    required: false
  - name: DISABLE_IPFS
    default: "false"
    required: false
volumes:
  - path: /config
    required: true
